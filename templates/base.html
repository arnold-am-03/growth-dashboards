<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Growth Dashboards{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23ECE5D6'/%3E%3Crect x='8' y='8' width='16' height='16' rx='3' fill='%232A2925'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
  <header class="site-head">
    <div class="wrap">
      <a class="brand" href="{{ url_for('index') }}">Growth<span class="dot"> · </span>Dashboards</a>
      <nav>Prestamype</nav>
    </div>
  </header>

  {% block body %}{% endblock %}

  <footer class="site-foot">
    <div class="wrap">Panel interno · Growth &amp; Performance</div>
  </footer>
</body>
</html>
