<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acceso · Growth Innovation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23ECE5D6'/%3E%3Crect x='8' y='8' width='16' height='16' rx='3' fill='%231F5750'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="login-body">
  <main class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <span class="brand-mark"></span>
        <div>
          <div class="brand-name">Growth Innovation</div>
          <div class="brand-tag" style="border:0;padding:0">Experimentos de la Bitacorita</div>
        </div>
      </div>

      <h1 class="login-title">Acceso al panel</h1>
      <p class="login-sub">Ingresa la contraseña del equipo para continuar.</p>

      {% if error %}<div class="login-error">{{ error }}</div>{% endif %}

      <form method="post" action="{{ url_for('auth.login') }}" autocomplete="off">
        <input type="hidden" name="next" value="{{ next }}">
        <label class="login-label" for="password">Contraseña</label>
        <input class="search login-input" type="password" id="password" name="password"
               required autofocus autocomplete="current-password" placeholder="••••••••">
        <button class="login-btn" type="submit">Entrar</button>
      </form>

      <p class="login-foot">Panel interno · Growth &amp; Performance</p>
    </div>
  </main>
</body>
</html>
