<div class="block evolucion">
  <div class="evol-head">
    <h3>Evolución mensual</h3>
    <span class="evol-range">{{ evol.rango }}</span>
  </div>
  <p class="desc">Casos agrupados por período de cierre.</p>

  <div class="chart-title">Volumen desembolsado por mes <span>(soles)</span></div>
  <div class="chart">{{ evol.vol_chart | safe }}</div>

  <div class="series">
    {% for s in evol.series %}
    <div class="series-card">
      <div class="series-label">{{ s.label }}</div>
      <div class="chart">{{ s.svg | safe }}</div>
    </div>
    {% endfor %}
  </div>
</div>
