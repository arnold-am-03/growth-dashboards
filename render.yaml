services:
  - type: web
    name: growth-dashboards
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      # Clave para firmar sesiones y códigos OTP. Valor largo y aleatorio.
      - key: SECRET_KEY
        sync: false
      # Correos con acceso, separados por coma. Amplía la lista aquí
      # (sin tocar código): Render reinicia el servicio al guardarla.
      - key: ALLOWED_EMAILS
        sync: false
      # SMTP para enviar los códigos (p.ej. Google Workspace):
      #   SMTP_HOST=smtp.gmail.com  SMTP_PORT=587
      #   SMTP_USER=cuenta@prestamype.com  SMTP_PASSWORD=app-password
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
