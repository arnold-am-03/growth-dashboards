services:
  - type: web
    name: growth-dashboards
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      # Clave para firmar sesiones y códigos OTP. Valor largo y aleatorio.
      - key: SECRET_KEY
        sync: false
      # Correos con acceso, separados por coma. Amplía la lista aquí
      # (sin tocar código): Render reinicia el servicio al guardarla.
      - key: ALLOWED_EMAILS
        sync: false
      # Envío de códigos por la API de Brevo (HTTPS). Es la vía que
      # funciona en Render, que bloquea los puertos SMTP salientes.
      # SMTP_FROM = remitente verificado en Brevo.
      - key: BREVO_API_KEY
        sync: false
      # SMTP clásico: solo para hosts que permiten SMTP saliente.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
